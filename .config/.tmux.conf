set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.tmux/plugins"

unbind r
bind r source-file ~/.tmux.conf \; display-message "[INFO] Config reloaded!"

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g default-terminal "tmux-256color"
set -g history-limit 100000
set -gq allow-passthrough on

# split window
bind -r v split-window -h
bind -r b split-window -v

# pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize pane
bind -r C-h resize-pane -L 1
bind -r C-j resize-pane -D 1
bind -r C-k resize-pane -U 1
bind -r C-l resize-pane -R 1

# vim-tmux-navigator companion bindings (BUG-019 fix)
# Required for cross-pane traversal: these forward C-h/j/k/l to Neovim when
# vim is focused, and select the adjacent pane otherwise.
# TPM also auto-installs equivalent bindings via the plugin's .tmux file, but
# explicit entries here ensure correct behaviour even if TPM runs out of order.
# See: https://github.com/christoomey/vim-tmux-navigator#tmux
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# List of plugins
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin 'christoomey/vim-tmux-navigator'

# copy like vim
set -g @plugin "tmux-plugins/tmux-yank"
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection

# autosaving and reloading tmux session
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"

set -g @continuum-restore "on"

# theme
set -g @plugin "catppuccin/tmux"
set -g @catppuccin_flavor "mocha"

set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_status_style "slanted"
set -g @catppuccin_window_number_position "left"

set -g focus-events on
set -g status-style bg=default
set -g status-left "#(cat #{socket_path}-\#{session_id}-vimbridge)"
set -g status-left-length 99
set -g status-right "#(cat #{socket_path}-\#{session_id}-vimbridge-R)"
set -g status-right-length 99
set -g status-justify centre

run "~/.tmux/plugins/tpm/tpm"
