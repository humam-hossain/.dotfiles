name: system_monitor

services:
  ping-viz:
    build: .
    container_name: system_monitor
    network_mode: host
    restart: always
    environment:
      - BIND_HOST=${BIND_HOST:-127.0.0.1}
      - PORT=${PORT:-8765}
      - COLLECTION_INTERVAL=${COLLECTION_INTERVAL:-5}
      - STALE_AFTER_SECONDS=${STALE_AFTER_SECONDS:-15}
    volumes:
      - ./ping.config:/app/ping.config:ro
      - ./data:/app/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
